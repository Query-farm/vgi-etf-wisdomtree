[tool.vgi-lint-check]
select = ["ALL"]
fail_on = "info"

[tool.vgi-lint-check.options]
column_comment_min_ratio = 0.8

[tool.vgi-lint-check.execution]
# Widen the scan-responds (VGI911) window — this HIDES NO FINDING, it only gives a genuinely
# network-bound scan time to answer. The UNFILTERED `SELECT * FROM holdings LIMIT 10` probe must,
# on the coordinator, first fetch WisdomTree's whole US ETF products page to seed the fund
# universe, then fetch the first fund's holdings page — two sequential HTTPS round trips that both
# go through WisdomTree's Cloudflare edge via the system-`curl` fallback (a plain `fetch` is 403'd
# on its TLS fingerprint). Cold, that comfortably clears within a minute but can exceed the 10s
# default. A single-fund filtered scan (one round trip) answers well inside the default.
scan_timeout = 60
execute_timeout = 60
